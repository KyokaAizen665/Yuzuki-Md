# fly.toml app configuration file generated for yuzukimdv1 on 2026-06-04T08:52:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'yuzukimdv1'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'info'
  PORT = '3000'

[[mounts]]
  source = 'yuzuki_session'
  destination = '/app/bot_session'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
